<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>B.ONE WELLNESS</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&display=swap');
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    :root{
      --bg:#F0EDE6;
      --surface:#FAFAF7;
      --green:#4A7360;--green-mid:#5D8C74;--green-light:#E8EFE9;--green-dark:#2E5243;
      --blush:#C9A89C;--blush-light:#F5EEEB;
      --gold:#B8893A;--gold-light:#F7F0E3;
      --aroma:#7B6FA0;--aroma-light:#F0EDF8;
      --stretch:#C47B55;--stretch-light:#F7EDE5;
      --text:#1E2820;--text-mid:#5A5A5A;--text-sub:#9A9A9A;
      --border:#DDD9D0;--border-light:#EAE6DF;
      --danger:#C05858;--radius:16px;
      --shadow:0 2px 16px rgba(30,40,32,.07);
      --shadow-sm:0 1px 6px rgba(30,40,32,.05)
    }
    body{font-family:-apple-system,'Apple SD Gothic Neo','Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;max-width:480px;margin:0 auto}
    #app{min-height:100vh;display:flex;flex-direction:column;position:relative}

    /* ── 헤더 ── */
    .header{background:var(--surface);padding:14px 18px 13px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border-light);position:sticky;top:0;z-index:100}
    .header-wordmark{font-family:'Cormorant Garamond',serif;font-size:19px;font-weight:600;color:var(--green-dark);letter-spacing:.6px}
    .header-dot{color:var(--blush)}
    .header-sub{font-size:11px;color:var(--text-sub);margin-top:1px;letter-spacing:.2px}
    .btn-text{background:none;border:none;color:var(--text-sub);font-size:12px;padding:5px 8px;cursor:pointer;letter-spacing:.1px}

    /* ── 레이아웃 ── */
    .content{flex:1;padding:18px 15px 88px}
    .bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:var(--surface);border-top:1px solid var(--border-light);display:flex;z-index:100;padding-bottom:env(safe-area-inset-bottom)}
    .nav-item{flex:1;display:flex;flex-direction:column;align-items:center;padding:9px 0 12px;cursor:pointer;border:none;background:none;color:var(--text-sub);font-size:9px;gap:3px;letter-spacing:.3px;text-transform:uppercase}
    .nav-item.active{color:var(--green)}
    .nav-icon{font-size:20px}

    /* ── 공통 카드 ── */
    .card{background:var(--surface);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow);margin-bottom:12px;border:1px solid var(--border-light)}

    /* ── 특별 클래스 배너 ── */
    .special-banner{background:linear-gradient(140deg,var(--green-dark) 0%,#3A6855 60%,#5C8970 100%);border-radius:var(--radius);padding:18px 16px;margin-bottom:16px;color:white;position:relative;overflow:hidden;box-shadow:0 6px 24px rgba(46,82,67,.25)}
    .special-banner::before{content:'';position:absolute;right:-10px;top:-20px;width:100px;height:100px;border-radius:50%;background:rgba(255,255,255,.06)}
    .special-banner::after{content:'';position:absolute;right:20px;bottom:-30px;width:140px;height:140px;border-radius:50%;background:rgba(255,255,255,.04)}
    .special-badge{display:inline-flex;align-items:center;gap:4px;background:rgba(255,255,255,.18);border-radius:20px;padding:3px 10px;font-size:10px;font-weight:700;margin-bottom:9px;letter-spacing:.5px}
    .special-name{font-size:19px;font-weight:800;margin-bottom:5px;position:relative;z-index:1}
    .special-meta{font-size:12px;opacity:.85;position:relative;z-index:1;line-height:1.7}
    .special-price{font-size:15px;font-weight:700;margin-top:6px;opacity:.95;position:relative;z-index:1}

    /* ── 수업 카드 (카테고리 컬러) ── */
    .class-card{background:var(--surface);border-radius:var(--radius);padding:15px 16px;box-shadow:var(--shadow-sm);margin-bottom:10px;border:1px solid var(--border-light);border-left:3px solid var(--green-mid)}
    .class-card.aroma{border-left-color:var(--aroma)}
    .class-card.stretch{border-left-color:var(--stretch)}
    .class-card.special{border-left-color:var(--gold);background:var(--gold-light)}
    .class-name{font-size:15px;font-weight:700;margin-bottom:4px;letter-spacing:-.2px}
    .class-meta{font-size:12px;color:var(--text-mid);line-height:1.7}
    .class-row{display:flex;justify-content:space-between;align-items:flex-start}
    .capacity-pill{display:inline-flex;align-items:center;font-size:11px;color:var(--text-sub);background:var(--bg);padding:3px 9px;border-radius:20px;margin-top:8px;border:1px solid var(--border-light)}
    .capacity-pill.few{color:var(--stretch);background:var(--stretch-light);border-color:transparent}
    .capacity-pill.full{color:var(--danger);background:#fdf0f0;border-color:transparent}

    /* ── 버튼 ── */
    .btn{display:inline-flex;align-items:center;justify-content:center;border:none;border-radius:10px;padding:10px 18px;font-size:13px;font-weight:600;cursor:pointer;transition:all .18s;gap:5px}
    .btn-primary{background:var(--green);color:white}
    .btn-primary:active{background:var(--green-dark)}
    .btn-primary:disabled{background:var(--border);color:var(--text-sub);cursor:not-allowed}
    .btn-outline{background:none;border:1.5px solid var(--border);color:var(--text)}
    .btn-danger{background:none;border:1.5px solid var(--danger);color:var(--danger)}
    .btn-full{width:100%;padding:14px;border-radius:12px;font-size:15px}
    .btn-sm{padding:7px 13px;font-size:12px;border-radius:9px}

    /* ── 폼 ── */
    .form-group{margin-bottom:15px}
    .form-label{display:block;font-size:11px;font-weight:700;color:var(--text-sub);margin-bottom:5px;letter-spacing:.4px;text-transform:uppercase}
    .form-input{width:100%;padding:12px 13px;border:1.5px solid var(--border);border-radius:11px;font-size:15px;background:var(--surface);color:var(--text);outline:none;-webkit-appearance:none;font-family:inherit}
    .form-input:focus{border-color:var(--green)}
    .form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}

    /* ── 로그인 ── */
    .login-wrap{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:36px 22px;background:var(--bg)}
    .login-logo{text-align:center;margin-bottom:36px}
    .login-visual{font-size:52px;margin-bottom:12px;display:block}
    .login-title{font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:600;color:var(--green-dark);letter-spacing:1px}
    .login-sub{font-size:12px;color:var(--text-sub);margin-top:5px;letter-spacing:.8px}
    .login-tabs{display:flex;background:var(--border-light);border-radius:12px;padding:3px;margin-bottom:20px;width:100%}
    .login-tab{flex:1;padding:10px;text-align:center;font-size:13px;font-weight:700;cursor:pointer;border-radius:9px;color:var(--text-sub);border:none;background:none;transition:all .2s;letter-spacing:.2px}
    .login-tab.active{background:var(--surface);color:var(--green-dark);box-shadow:0 1px 8px rgba(0,0,0,.08)}
    .login-box{background:var(--surface);border-radius:var(--radius);padding:22px;width:100%;box-shadow:var(--shadow);border:1px solid var(--border-light)}
    .login-hint{text-align:center;font-size:11px;color:var(--text-sub);margin-top:12px;line-height:1.6}

    /* ── 날짜 칩 ── */
    .date-chips{display:flex;gap:6px;overflow-x:auto;padding-bottom:6px;margin-bottom:14px;scrollbar-width:none}
    .date-chips::-webkit-scrollbar{display:none}
    .date-chip{flex-shrink:0;padding:7px 13px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;border:1.5px solid var(--border);background:var(--surface);color:var(--text-sub);transition:all .2s}
    .date-chip.active{background:var(--green-dark);border-color:var(--green-dark);color:white}

    /* ── 섹션 타이틀 ── */
    .section-title{font-size:13px;font-weight:700;margin-bottom:10px;color:var(--text-mid);letter-spacing:.3px}

    /* ── 통계 ── */
    .stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;margin-bottom:18px}
    .stat-card{background:var(--surface);border-radius:14px;padding:14px 8px;text-align:center;box-shadow:var(--shadow-sm);border:1px solid var(--border-light)}
    .stat-num{font-size:24px;font-weight:900;color:var(--green-dark)}
    .stat-label{font-size:10px;color:var(--text-sub);margin-top:2px;letter-spacing:.2px}

    /* ── 모달 ── */
    .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200;display:flex;align-items:flex-end;animation:fadeIn .2s}
    .modal{background:var(--surface);border-radius:22px 22px 0 0;padding:22px 18px 44px;width:100%;max-width:480px;margin:0 auto;max-height:88vh;overflow-y:auto;animation:slideUp .28s}
    .modal-handle{width:34px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 18px}
    .modal-title{font-size:17px;font-weight:800;margin-bottom:18px;letter-spacing:-.2px}
    @keyframes fadeIn{from{opacity:0}}
    @keyframes slideUp{from{transform:translateY(100%)}}

    /* ── 결제 선택 옵션 ── */
    .pay-options{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
    .pay-option{border:2px solid var(--border);border-radius:14px;padding:16px 10px;text-align:center;cursor:pointer;transition:all .2s;background:var(--surface)}
    .pay-option.selected{border-color:var(--green);background:var(--green-light)}
    .pay-option.disabled{opacity:.45;cursor:not-allowed;pointer-events:none}
    .pay-icon{font-size:26px;margin-bottom:6px}
    .pay-label{font-size:13px;font-weight:700;color:var(--text)}
    .pay-desc{font-size:11px;color:var(--text-sub);margin-top:3px}
    .pay-soon{font-size:10px;font-weight:700;color:var(--text-sub);background:var(--bg);padding:2px 8px;border-radius:10px;display:inline-block;margin-top:5px}

    /* ── 배지 ── */
    .badge{display:inline-flex;align-items:center;padding:2px 9px;border-radius:20px;font-size:11px;font-weight:700}
    .badge-green{background:var(--green-light);color:var(--green-dark)}
    .badge-gold{background:var(--gold-light);color:var(--gold)}
    .badge-blush{background:var(--blush-light);color:#8A5A50}
    .badge-red{background:#fdf0f0;color:var(--danger)}
    .badge-gray{background:var(--bg);color:var(--text-sub)}

    /* ── 빈 상태 ── */
    .empty{text-align:center;padding:44px 20px;color:var(--text-sub)}
    .empty-icon{font-size:44px;margin-bottom:10px;opacity:.6}
    .empty-text{font-size:14px;font-weight:600}
    .empty-sub{font-size:12px;margin-top:4px}

    /* ── 체크인 ── */
    .check-btn{width:30px;height:30px;border-radius:50%;border:2px solid var(--border);background:none;cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;transition:all .2s}
    .check-btn.on{background:var(--green);border-color:var(--green);color:white}

    /* ── 예약 리스트 ── */
    .booking-row{display:flex;align-items:center;justify-content:space-between;padding:11px 0;border-bottom:1px solid var(--border-light)}
    .booking-row:last-child{border-bottom:none}

    /* ── 수업 관리 액션 ── */
    .class-actions{display:flex;gap:7px;margin-top:11px}

    /* ── FAB ── */
    .fab{position:fixed;bottom:78px;right:18px;width:50px;height:50px;border-radius:50%;background:var(--green-dark);color:white;border:none;font-size:22px;cursor:pointer;box-shadow:0 4px 18px rgba(46,82,67,.35);display:flex;align-items:center;justify-content:center;z-index:99}

    /* ── 토스트 ── */
    .toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:#1E2820;color:white;padding:10px 20px;border-radius:20px;font-size:12px;font-weight:600;z-index:300;animation:toastIn .25s,toastOut .25s 2.3s forwards;white-space:nowrap;letter-spacing:.1px}
    @keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(10px)}}
    @keyframes toastOut{to{opacity:0;transform:translateX(-50%) translateY(10px)}}

    /* ── 구분선 ── */
    .divider{height:1px;background:var(--border-light);margin:16px 0}

    @media(min-width:480px){body{box-shadow:0 0 50px rgba(0,0,0,.08)}}
  </style>
</head>
<body>
<div id="app"></div>
<script>
// ━━━ 설정 ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const ADMIN_PW_DEFAULT = 'bione1234';

// ━━━ 카테고리 ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const CATS = {
  healing: {label:'힐링·리스토어', css:''},
  vinyasa: {label:'빈야사·인요가',  css:''},
  aroma:   {label:'아로마',         css:'aroma'},
  stretch: {label:'스트레칭',       css:'stretch'},
  special: {label:'특별 클래스',    css:'special'},
};

// ━━━ 주간 정기 시간표 (June Summer Wellness Flow) ━━━
const WEEKLY = [
  {dow:1,time:'07:00',name:'빈야사 싱잉볼',cat:'vinyasa'},
  {dow:1,time:'10:30',name:'리스토어 하타',cat:'healing'},
  {dow:1,time:'12:00',name:'힐링요가 싱잉볼',cat:'healing'},
  {dow:2,time:'10:30',name:'테라피 요가',cat:'healing'},
  {dow:2,time:'12:00',name:'스트레칭 순환요가',cat:'stretch'},
  {dow:3,time:'07:00',name:'리스토어 하타',cat:'healing'},
  {dow:3,time:'10:30',name:'아로마 빈야사',cat:'aroma'},
  {dow:3,time:'12:00',name:'리스토어 하타',cat:'healing'},
  {dow:3,time:'20:00',name:'아로마호흡 빈야사',cat:'aroma'},
  {dow:4,time:'10:30',name:'스트레칭 순환요가',cat:'stretch'},
  {dow:4,time:'12:00',name:'힐링 플로우',cat:'healing'},
  {dow:4,time:'20:00',name:'인요가 싱잉볼',cat:'vinyasa'},
  {dow:5,time:'07:00',name:'아로마 호흡빈야사',cat:'aroma'},
  {dow:5,time:'10:30',name:'힐링 플로우',cat:'healing'},
  {dow:5,time:'12:00',name:'아로마 호흡빈야사',cat:'aroma'},
  {dow:5,time:'20:00',name:'아로마 힐링테라피',cat:'aroma'},
  {dow:6,time:'14:00',name:'하타요가 & 싱잉볼',cat:'healing'},
];

// ━━━ 로컬 스토리지 ━━━━━━━━━━━━━━━━━━━━━━━
const S={
  get:(k,d)=>{try{const v=localStorage.getItem(k);return v?JSON.parse(v):d}catch{return d}},
  set:(k,v)=>localStorage.setItem(k,JSON.stringify(v)),
};

function getCfg(){ return S.get('b1_cfg',{pw:ADMIN_PW_DEFAULT,instructor:'정윤희',defaultPrice:35000,defaultCap:10}); }
function getClasses(){ const c=S.get('b1_cls',null);if(!c){const g=genSched();S.set('b1_cls',g);return g;}return c; }
function saveClasses(c){ S.set('b1_cls',c); }
function getBookings(){ return S.get('b1_bkg',[]); }
function saveBookings(b){ S.set('b1_bkg',b); }

function genSched(){
  const cfg=getCfg(),cls=[],today=new Date();
  for(let w=0;w<4;w++) for(let d=0;d<7;d++){
    const dt=new Date(today); dt.setDate(today.getDate()+w*7+d);
    const dow=dt.getDay();
    WEEKLY.filter(t=>t.dow===dow).forEach(t=>{
      cls.push({id:uid(),name:t.name,date:dt.toISOString().split('T')[0],time:t.time,
        duration:50,capacity:cfg.defaultCap,instructor:cfg.instructor,
        description:'',price:cfg.defaultPrice,category:t.cat,
        isSpecial:false,specialBadge:'이달의 특별 클래스',createdAt:Date.now()});
    });
  }
  return cls;
}

// ━━━ 유틸 ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function uid(){return 'id_'+Date.now()+'_'+Math.random().toString(36).slice(2,7);}
const DAYS=['일','월','화','수','목','금','토'];
function fmtDate(s){const d=new Date(s+'T00:00:00');return `${d.getMonth()+1}월 ${d.getDate()}일 (${DAYS[d.getDay()]})`;}
function fmtTime(t){const[h,m]=t.split(':').map(Number);return `${h<12?'오전':'오후'} ${h<=12?h:h-12}:${String(m).padStart(2,'0')}`;}
function fmtMoney(n){return n.toLocaleString()+'원';}
function todayStr(){return new Date().toISOString().split('T')[0];}
function isFuture(d){return d>=todayStr();}
function isToday(d){return d===todayStr();}
function bookCount(id){return getBookings().filter(b=>b.classId===id&&b.status==='confirmed').length;}
function myBkg(cid,phone){return getBookings().find(b=>b.classId===cid&&b.customerPhone===phone&&b.status==='confirmed');}
function cancelOk(cls){return new Date()<new Date(cls.date+'T23:59:59');}
function dateRange(){const a=[],t=new Date();for(let i=0;i<14;i++){const d=new Date(t);d.setDate(t.getDate()+i);a.push(d.toISOString().split('T')[0]);}return a;}
function cfmt(p){return p.replace(/[^0-9]/g,'').replace(/(\d{3})(\d{3,4})(\d{4})/,'$1-$2-$3');}

function toast(msg){
  document.querySelectorAll('.toast').forEach(e=>e.remove());
  const e=document.createElement('div');e.className='toast';e.textContent=msg;
  document.body.appendChild(e);setTimeout(()=>e.remove(),2700);
}

// ━━━ 상태 ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const A={
  user:S.get('b1_user',null),
  screen:'login',
  cTab:'schedule',
  aTab:'dash',
  selDate:todayStr(),
  modal:null,
  mData:null,
  editCls:null,
  payMethod:'spot',  // spot(현장결제) | postpay(후불결제)
  loginTab:'customer',
  _fsp:false,  // 특별 클래스 체크박스 임시 상태
};

// ━━━ 메인 렌더 ━━━━━━━━━━━━━━━━━━━━━━━━━━━
function render(){
  const app=document.getElementById('app');
  if(!A.user){app.innerHTML=renderLogin();}
  else if(A.user.role==='customer'){app.innerHTML=renderCustomer();}
  else{app.innerHTML=renderAdmin();}
  if(A.modal) app.insertAdjacentHTML('beforeend',renderModal());
  bindKeys();
}

// ━━━ 로그인 ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function renderLogin(){
  return `<div class="login-wrap">
    <div class="login-logo">
      <span class="login-visual">🌿</span>
      <div class="login-title">B<span class="header-dot">.</span>ONE WELLNESS</div>
      <div class="login-sub">Yoga &amp; Wellness Studio</div>
    </div>
    <div style="width:100%">
      <div class="login-tabs">
        <button class="login-tab ${A.loginTab==='customer'?'active':''}" onclick="A.loginTab='customer';render()">회원 예약</button>
        <button class="login-tab ${A.loginTab==='admin'?'active':''}" onclick="A.loginTab='admin';render()">관리자</button>
      </div>
      <div class="login-box">
        ${A.loginTab==='customer'?`
          <div class="form-group">
            <label class="form-label">이름</label>
            <input class="form-input" id="ln" type="text" placeholder="홍길동" autocomplete="name">
          </div>
          <div class="form-group">
            <label class="form-label">휴대폰 번호</label>
            <input class="form-input" id="lp" type="tel" placeholder="010-1234-5678" autocomplete="tel">
          </div>
          <button class="btn btn-primary btn-full" onclick="loginCustomer()">입장하기</button>
          <p class="login-hint">별도 회원가입 없이<br>이름과 번호만으로 예약할 수 있어요</p>
        `:`
          <div class="form-group">
            <label class="form-label">관리자 비밀번호</label>
            <input class="form-input" id="apw" type="password" placeholder="비밀번호">
          </div>
          <button class="btn btn-primary btn-full" onclick="loginAdmin()">관리자 입장</button>
        `}
      </div>
    </div>
  </div>`;
}

function loginCustomer(){
  const n=document.getElementById('ln')?.value.trim();
  const p=cfmt(document.getElementById('lp')?.value||'');
  if(!n){toast('이름을 입력해주세요');return;}
  if(p.length<9){toast('휴대폰 번호를 입력해주세요');return;}
  A.user={name:n,phone:p,role:'customer'};
  S.set('b1_user',A.user); A.screen='main'; render();
}
function loginAdmin(){
  const pw=document.getElementById('apw')?.value;
  if(pw===getCfg().pw){A.user={name:'관리자',role:'admin'};S.set('b1_user',A.user);A.screen='main';render();}
  else toast('비밀번호가 틀렸습니다');
}
function logout(){A.user=null;S.set('b1_user',null);A.screen='login';A.modal=null;render();}

// ━━━ 고객 화면 ━━━━━━━━━━━━━━━━━━━━━━━━━━━
function renderCustomer(){
  return `<div>
    <div class="header">
      <div>
        <div class="header-wordmark">B<span class="header-dot">.</span>ONE WELLNESS</div>
        <div class="header-sub">안녕하세요, ${A.user.name}님 👋</div>
      </div>
      <button class="btn-text" onclick="logout()">로그아웃</button>
    </div>
    <div class="content">
      ${A.cTab==='schedule'?renderSchedule():renderMyBkgs()}
    </div>
    <nav class="bottom-nav">
      <button class="nav-item ${A.cTab==='schedule'?'active':''}" onclick="A.cTab='schedule';render()">
        <span class="nav-icon">📅</span><span>수업</span>
      </button>
      <button class="nav-item ${A.cTab==='my'?'active':''}" onclick="A.cTab='my';render()">
        <span class="nav-icon">🎫</span><span>내 예약</span>
      </button>
    </nav>
  </div>`;
}

function renderSchedule(){
  const specials=getClasses().filter(c=>c.isSpecial&&isFuture(c.date)).sort((a,b)=>a.date.localeCompare(b.date));
  const dates=dateRange();
  const all=getClasses().filter(c=>isFuture(c.date)).sort((a,b)=>a.date!==b.date?a.date.localeCompare(b.date):a.time.localeCompare(b.time));

  const banners=specials.slice(0,3).map(c=>{
    const rem=c.capacity-bookCount(c.id),mine=myBkg(c.id,A.user.phone);
    return `<div class="special-banner">
      <div class="special-badge">✨ ${c.specialBadge||'특별 클래스'}</div>
      <div class="special-name">${c.name}</div>
      <div class="special-meta">📅 ${fmtDate(c.date)}&nbsp;&nbsp;${fmtTime(c.time)}&nbsp;·&nbsp;${c.duration}분</div>
      <div class="special-meta">강사: ${c.instructor}&nbsp;&nbsp;·&nbsp;&nbsp;잔여 ${rem}자리</div>
      <div class="special-price">${fmtMoney(c.price)}</div>
      <div style="margin-top:12px">
        ${mine?`<span class="badge" style="background:rgba(255,255,255,.25);color:white;font-size:12px">✓ 예약완료</span>`
          :rem<=0?`<span class="badge" style="background:rgba(0,0,0,.2);color:rgba(255,255,255,.8)">마감</span>`
          :`<button class="btn" style="background:white;color:var(--green-dark);font-size:13px;font-weight:700;padding:8px 18px" onclick="openBook('${c.id}')">예약하기</button>`}
      </div>
    </div>`;
  }).join('');

  const chips=dates.map(d=>{
    const hasC=all.some(c=>c.date===d);
    return `<button class="date-chip ${A.selDate===d?'active':''}" onclick="A.selDate='${d}';render()" style="${!hasC&&A.selDate!==d?'opacity:.4':''}">
      ${isToday(d)?'오늘':`${new Date(d+'T00:00:00').getMonth()+1}/${new Date(d+'T00:00:00').getDate()} (${DAYS[new Date(d+'T00:00:00').getDay()]})`}
    </button>`;
  }).join('');

  const dayCls=all.filter(c=>c.date===A.selDate&&!c.isSpecial);
  const cards=dayCls.length===0
    ?`<div class="empty"><div class="empty-icon">🧘</div><div class="empty-text">이 날은 수업이 없어요</div><div class="empty-sub">다른 날짜를 선택해보세요</div></div>`
    :dayCls.map(c=>renderClassCard(c)).join('');

  return `${specials.length>0?banners:''}
    <div class="date-chips">${chips}</div>
    <div class="section-title">${fmtDate(A.selDate)}</div>
    ${cards}`;
}

function renderClassCard(cls){
  const cnt=bookCount(cls.id),rem=cls.capacity-cnt;
  const isFull=rem<=0,isFew=rem>0&&rem<=3;
  const mine=myBkg(cls.id,A.user.phone);

  let pillCls='',pillTxt='';
  if(isFull){pillCls='full';pillTxt='마감';}
  else if(isFew){pillCls='few';pillTxt=`잔여 ${rem}자리`;}
  else{pillTxt=`${cnt}/${cls.capacity}명`;}

  const action=mine?`<span class="badge badge-green" style="font-size:11px">✓ 예약됨</span>`
    :isFull?`<button class="btn btn-sm" style="background:var(--bg);color:var(--text-sub);cursor:not-allowed;border:none" disabled>마감</button>`
    :`<button class="btn btn-primary btn-sm" onclick="openBook('${cls.id}')">예약</button>`;

  return `<div class="class-card ${CATS[cls.category]?.css||''}">
    <div class="class-row">
      <div class="class-name">${cls.name}</div>
      ${action}
    </div>
    <div class="class-meta">${fmtTime(cls.time)}&nbsp;·&nbsp;${cls.duration}분&nbsp;·&nbsp;${cls.instructor}</div>
    ${cls.description?`<div class="class-meta" style="margin-top:2px;color:var(--text-sub)">${cls.description}</div>`:''}
    <div style="display:flex;align-items:center;justify-content:space-between;margin-top:6px">
      <span class="capacity-pill ${pillCls}">👥 ${pillTxt}</span>
      <span style="font-size:12px;color:var(--green-dark);font-weight:700">${fmtMoney(cls.price)}</span>
    </div>
  </div>`;
}

function renderMyBkgs(){
  const bkgs=getBookings().filter(b=>b.customerPhone===A.user.phone);
  const upcoming=bkgs.filter(b=>{const c=getClasses().find(x=>x.id===b.classId);return c&&isFuture(c.date)&&b.status==='confirmed';});
  const past=bkgs.filter(b=>{const c=getClasses().find(x=>x.id===b.classId);return c&&!isFuture(c.date);});

  const card=(b,isPast)=>{
    const c=getClasses().find(x=>x.id===b.classId);if(!c)return '';
    const isSpot=b.paymentMethod==='spot';
    const pBadge=b.status==='confirmed'
      ?isSpot?`<span class="badge badge-blush">🏠 현장결제</span>`:`<span class="badge badge-gold">📋 후불결제</span>`
      :`<span class="badge badge-red">취소됨</span>`;
    return `<div class="class-card ${CATS[c.category]?.css||''}">
      <div class="class-row">
        <div class="class-name">${c.name}</div>
        ${pBadge}
      </div>
      <div class="class-meta">${fmtDate(c.date)}&nbsp;·&nbsp;${fmtTime(c.time)}</div>
      <div class="class-meta">${fmtMoney(c.price)}&nbsp;·&nbsp;${c.instructor}</div>
      ${!isPast&&b.status==='confirmed'&&cancelOk(c)?`
        <div style="margin-top:10px">
          <button class="btn btn-danger btn-sm" onclick="cancelBkg('${b.id}')">예약 취소</button>
        </div>`:''}
    </div>`;
  };

  return `<div class="section-title">예정된 예약 (${upcoming.length})</div>
    ${upcoming.length===0?`<div class="empty"><div class="empty-icon">🎫</div><div class="empty-text">예약된 수업이 없어요</div><div class="empty-sub">수업 탭에서 예약해보세요</div></div>`:upcoming.map(b=>card(b,false)).join('')}
    ${past.length>0?`<div class="section-title" style="margin-top:22px;color:var(--text-sub)">지난 수업 (${past.length})</div>${past.map(b=>card(b,true)).join('')}`:''}`;
}

// ━━━ 관리자 화면 ━━━━━━━━━━━━━━━━━━━━━━━━━━
function renderAdmin(){

function renderDash(){
  const t=todayStr(),cls=getClasses(),bkgs=getBookings();
  const todayCls=cls.filter(c=>c.date===t).sort((a,b)=>a.time.localeCompare(b.time));
  const todayBkg=bkgs.filter(b=>{const c=cls.find(x=>x.id===b.classId);return c&&c.date===t&&b.status==='confirmed';});
  const members=[...new Set(bkgs.filter(b=>b.status==='confirmed').map(b=>b.customerPhone))];
  const postpay=bkgs.filter(b=>b.status==='confirmed'&&b.paymentMethod==='postpay');

  const todayCards=todayCls.length===0
    ?`<div class="empty" style="padding:22px 20px"><div class="empty-icon">📅</div><div class="empty-text">오늘 수업이 없어요</div></div>`
    :todayCls.map(c=>{
      const cnt=bookCount(c.id);
      return `<div class="card" style="cursor:pointer" onclick="viewBkg('${c.id}')">
        <div style="display:flex;justify-content:space-between;align-items:center">
          <div>
            <div style="font-size:15px;font-weight:700;letter-spacing:-.2px">${c.name}</div>
            <div style="font-size:12px;color:var(--text-mid);margin-top:2px">${fmtTime(c.time)}&nbsp;·&nbsp;${c.duration}분</div>
          </div>
          <div style="text-align:right">
            <div style="font-size:22px;font-weight:900;color:var(--green-dark)">${cnt}</div>
            <div style="font-size:10px;color:var(--text-sub)">/ ${c.capacity}명</div>
          </div>
        </div>
        <div style="font-size:11px;color:var(--green-mid);margin-top:8px;font-weight:600">예약 현황 보기 →</div>
      </div>`;
    }).join('');

  return `<div class="stats-grid">
    <div class="stat-card"><div class="stat-num">${todayCls.length}</div><div class="stat-label">오늘 수업</div></div>
    <div class="stat-card"><div class="stat-num">${todayBkg.length}</div><div class="stat-label">오늘 예약</div></div>
    <div class="stat-card"><div class="stat-num">${members.length}</div><div class="stat-label">총 회원</div></div>
  </div>
  ${postpay.length>0?`<div class="card" style="background:var(--gold-light);border-color:var(--gold);margin-bottom:14px">
    <div style="font-size:13px;font-weight:700;color:var(--gold)">📋 후불결제 대기 ${postpay.length}건</div>
    <div style="font-size:11px;color:var(--text-mid);margin-top:3px">수업 종료 후 결제가 필요한 예약이 있어요</div>
  </div>`:''}
  <div class="section-title">오늘의 수업</div>${todayCards}`;
}

function renderManage(){
  const cls=getClasses().filter(c=>isFuture(c.date)).sort((a,b)=>a.date!==b.date?a.date.localeCompare(b.date):a.time.localeCompare(b.time));
  if(!cls.length) return `<div class="empty"><div class="empty-icon">📋</div><div class="empty-text">등록된 수업이 없어요</div><div class="empty-sub">+ 버튼으로 수업을 추가하세요</div></div>`;

  return cls.map(c=>{
    const cnt=bookCount(c.id);
    return `<div class="class-card ${CATS[c.category]?.css||''}">
      <div class="class-row">
        <div>
          <div class="class-name">${c.isSpecial?'✨ ':''} ${c.name}</div>
          <div class="class-meta">${fmtDate(c.date)}&nbsp;·&nbsp;${fmtTime(c.time)}</div>
          <div class="class-meta">${c.duration}분&nbsp;·&nbsp;${fmtMoney(c.price)}&nbsp;·&nbsp;정원 ${c.capacity}명</div>
        </div>
        <div style="text-align:right">
          <div style="font-size:20px;font-weight:900;color:var(--green-dark)">${cnt}</div>
          <div style="font-size:10px;color:var(--text-sub)">/ ${c.capacity}</div>
        </div>
      </div>
      <div class="class-actions">
        <button class="btn btn-outline btn-sm" onclick="viewBkg('${c.id}')">예약현황</button>
        <button class="btn btn-outline btn-sm" onclick="editCls('${c.id}')">수정</button>
        <button class="btn btn-danger btn-sm" onclick="delCls('${c.id}')">삭제</button>
      </div>

  }).join('');
}

function openBook(id){A.modal='book';A.mData=id;A.payMethod='spot';render();}
function closeModal(){A.modal=null;A.mData=null;A.editCls=null;render();}
function closeModalBg(e){if(e.target===e.currentTarget)closeModal();}

function confirmBook(classId){
  const cls=getClasses().find(c=>c.id===classId);if(!cls)return;
  const bkgs=getBookings();
  if(bkgs.find(b=>b.classId===classId&&b.customerPhone===A.user.phone&&b.status==='confirmed')){toast('이미 예약하신 수업이에요');return;}
  if(bookCount(classId)>=cls.capacity){toast('정원이 마감되었어요');return;}
  bkgs.push({id:uid(),classId,customerName:A.user.name,customerPhone:A.user.phone,
    paymentMethod:A.payMethod,paymentStatus:'pending',
    checkedIn:false,status:'confirmed',amount:cls.price,createdAt:Date.now()});
  saveBookings(bkgs);closeModal();
  toast(A.payMethod==='spot'?'현장결제로 예약됐어요 🌿':'후불결제로 예약됐어요 🌿');
}

function cancelBkg(id){
  if(!confirm('예약을 취소하시겠어요?\n(당일 자정 이전까지만 가능)'))return;
  const bkgs=getBookings(),b=bkgs.find(x=>x.id===id);
  const cls=b?getClasses().find(c=>c.id===b.classId):null;
  if(cls&&!cancelOk(cls)){toast('당일 자정 이후에는 취소할 수 없어요');return;}
  if(b)b.status='cancelled';
  saveBookings(bkgs);toast('예약이 취소됐어요');render();
}

function toggleCheck(id){
  const bkgs=getBookings(),b=bkgs.find(x=>x.id===id);
  if(b)b.checkedIn=!b.checkedIn;saveBookings(bkgs);render();
}

function viewBkg(id){A.modal='bkg-view';A.mData=id;render();}
function openAddCls(){A.modal='cls-form';A.editCls=null;A._fsp=false;render();}
function editCls(id){A.editCls=getClasses().find(c=>c.id===id)||null;A._fsp=A.editCls?.isSpecial||false;A.modal='cls-form';render();}

function delCls(id){
  if(!confirm('수업을 삭제하시겠어요?'))return;
  saveClasses(getClasses().filter(c=>c.id!==id));
  saveBookings(getBookings().filter(b=>b.classId!==id));
  toast('수업이 삭제됐어요');render();
}

function getFormData(){
  return {
    name:document.getElementById('fn')?.value.trim(),
    date:document.getElementById('fd')?.value,
    time:document.getElementById('ft')?.value,
    duration:parseInt(document.getElementById('fdu')?.value),
    capacity:parseInt(document.getElementById('fca')?.value),
    price:parseInt(document.getElementById('fpr')?.value),
    category:document.getElementById('fct')?.value,
    instructor:document.getElementById('fin')?.value.trim(),
    description:document.getElementById('fds')?.value.trim(),
    isSpecial:!!document.getElementById('fsp')?.checked,
    specialBadge:document.getElementById('fsb')?.value.trim()||'이달의 특별 클래스',
  };
}

function addCls(){
  const f=getFormData();
  if(!f.name||!f.date||!f.time||!f.duration||!f.capacity||!f.price){toast('필수 항목을 모두 입력해주세요');return;}
  const cls=getClasses();
  cls.push({id:uid(),...f,instructor:f.instructor||getCfg().instructor,createdAt:Date.now()});
  saveClasses(cls);closeModal();toast('수업이 추가됐어요');
}

function saveCls(id){
  const f=getFormData();
  if(!f.name||!f.date||!f.time||!f.duration||!f.capacity||!f.price){toast('필수 항목을 모두 입력해주세요');return;}
  const cls=getClasses(),i=cls.findIndex(c=>c.id===id);if(i<0)return;
  cls[i]={...cls[i],...f};saveClasses(cls);closeModal();toast('수업이 수정됐어요');
}

// ━━━ 키 바인딩 ━━━━━━━━━━━━━━━━━━━━━━━━━━━
function bindKeys(){
  document.getElementById('lp')?.addEventListener('keypress',e=>e.key==='Enter'&&loginCustomer());
  document.getElementById('apw')?.addEventListener('keypress',e=>e.key==='Enter'&&loginAdmin());
  document.getElementById('ln')?.addEventListener('keypress',e=>e.key==='Enter'&&document.getElementById('lp')?.focus());
}
document.addEventListener('change',e=>{if(e.target.id==='fsp'){A._fsp=e.target.checked;render();}});

// ━━━ 초기화 ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
if(A.user)A.screen='main';
render();
</script>
</body>
</html>
