<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>B.ONE WELLNESS</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&display=swap');
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    :root{
      --bg:#F0EDE6;--surface:#FAFAF7;
      --green:#4A7360;--gm:#5D8C74;--gl:#E8EFE9;--gd:#2E5243;
      --blush:#C9A89C;--bl:#F5EEEB;
      --gold:#B8893A;--gol:#F7F0E3;
      --aroma:#7B6FA0;--al:#F0EDF8;
      --stretch:#C47B55;--sl:#F7EDE5;
      --text:#1E2820;--tm:#5A5A5A;--ts:#9A9A9A;
      --border:#DDD9D0;--bl2:#EAE6DF;
      --danger:#C05858;--warn:#D4784A;
      --r:14px;--sh:0 2px 16px rgba(30,40,32,.07);--ss:0 1px 6px rgba(30,40,32,.05)
    }
    body{font-family:-apple-system,'Apple SD Gothic Neo','Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;max-width:480px;margin:0 auto}
    #app{min-height:100vh;display:flex;flex-direction:column}
    .hdr{background:var(--surface);padding:13px 17px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--bl2);position:sticky;top:0;z-index:100}
    .wm{font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:600;color:var(--gd);letter-spacing:.5px}
    .hs{font-size:11px;color:var(--ts);margin-top:1px}
    .bt{background:none;border:none;color:var(--ts);font-size:12px;padding:5px 8px;cursor:pointer}
    .content{flex:1;padding:16px 14px 86px}
    .bnav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:var(--surface);border-top:1px solid var(--bl2);display:flex;z-index:100;padding-bottom:env(safe-area-inset-bottom)}
    .ni{flex:1;display:flex;flex-direction:column;align-items:center;padding:8px 0 11px;cursor:pointer;border:none;background:none;color:var(--ts);font-size:9px;gap:2px;letter-spacing:.2px}
    .ni.on{color:var(--green)}
    .ni-ic{font-size:19px}
    .card{background:var(--surface);border-radius:var(--r);padding:14px;box-shadow:var(--sh);margin-bottom:10px;border:1px solid var(--bl2)}

    /* 수업 카드 */
    .cc{background:var(--surface);border-radius:var(--r);padding:13px 15px;box-shadow:var(--ss);margin-bottom:9px;border:1px solid var(--bl2);border-left:3px solid var(--gm)}
    .cc.aroma{border-left-color:var(--aroma)}.cc.stretch{border-left-color:var(--stretch)}.cc.special{border-left-color:var(--gold);background:var(--gol)}
    .cn{font-size:15px;font-weight:700;margin-bottom:3px;letter-spacing:-.2px}
    .cm{font-size:12px;color:var(--tm);line-height:1.7}
    .crow{display:flex;justify-content:space-between;align-items:flex-start}

    /* 특별 배너 */
    .sb{background:linear-gradient(140deg,var(--gd),#3A6855 60%,#5C8970);border-radius:var(--r);padding:16px;margin-bottom:14px;color:white;position:relative;overflow:hidden;box-shadow:0 6px 24px rgba(46,82,67,.25)}
    .sb::before{content:'';position:absolute;right:-10px;top:-20px;width:90px;height:90px;border-radius:50%;background:rgba(255,255,255,.06)}
    .sbadge{display:inline-flex;align-items:center;background:rgba(255,255,255,.18);border-radius:20px;padding:2px 9px;font-size:10px;font-weight:700;margin-bottom:7px;letter-spacing:.4px}
    .sn{font-size:18px;font-weight:800;margin-bottom:4px}
    .sm{font-size:12px;opacity:.85;line-height:1.7}
    .sp{font-size:14px;font-weight:700;margin-top:5px}

    /* 버튼 */
    .btn{display:inline-flex;align-items:center;justify-content:center;border:none;border-radius:10px;padding:9px 16px;font-size:13px;font-weight:600;cursor:pointer;transition:all .18s;gap:4px}
    .bp{background:var(--green);color:white}.bp:active{background:var(--gd)}.bp:disabled{background:var(--border);color:var(--ts);cursor:not-allowed}
    .bo{background:none;border:1.5px solid var(--border);color:var(--text)}
    .bd{background:none;border:1.5px solid var(--danger);color:var(--danger)}
    .bw{background:none;border:1.5px solid var(--warn);color:var(--warn)}
    .bfull{width:100%;padding:13px;border-radius:12px;font-size:15px}
    .bsm{padding:6px 12px;font-size:12px;border-radius:8px}
    .bapp{background:#E8F4ED;color:var(--gd);border:none;border-radius:8px;padding:6px 14px;font-size:12px;font-weight:700;cursor:pointer}
    .brej{background:#fdf0f0;color:var(--danger);border:none;border-radius:8px;padding:6px 14px;font-size:12px;font-weight:700;cursor:pointer}

    /* 폼 */
    .fg{margin-bottom:13px}
    .fl{display:block;font-size:11px;font-weight:700;color:var(--ts);margin-bottom:5px;letter-spacing:.3px;text-transform:uppercase}
    .fi{width:100%;padding:11px 12px;border:1.5px solid var(--border);border-radius:10px;font-size:15px;background:var(--surface);color:var(--text);outline:none;-webkit-appearance:none;font-family:inherit}
    .fi:focus{border-color:var(--green)}
    .frow{display:grid;grid-template-columns:1fr 1fr;gap:9px}

    /* 로그인 */
    .lw{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 20px;background:var(--bg)}
    .ll{text-align:center;margin-bottom:32px}
    .lv{font-size:50px;margin-bottom:10px;display:block}
    .lt{font-family:'Cormorant Garamond',serif;font-size:24px;font-weight:600;color:var(--gd);letter-spacing:1px}
    .ls{font-size:11px;color:var(--ts);margin-top:4px;letter-spacing:.7px}
    .ltab{display:flex;background:var(--bl2);border-radius:11px;padding:3px;margin-bottom:18px;width:100%}
    .ltb{flex:1;padding:9px;text-align:center;font-size:13px;font-weight:700;cursor:pointer;border-radius:8px;color:var(--ts);border:none;background:none;transition:all .2s}
    .ltb.on{background:var(--surface);color:var(--gd);box-shadow:0 1px 8px rgba(0,0,0,.08)}
    .lbox{background:var(--surface);border-radius:var(--r);padding:20px;width:100%;box-shadow:var(--sh);border:1px solid var(--bl2)}
    .lhint{text-align:center;font-size:11px;color:var(--ts);margin-top:10px;line-height:1.5}

    /* 날짜 칩 */
    .dchips{display:flex;gap:6px;overflow-x:auto;padding-bottom:6px;margin-bottom:12px;scrollbar-width:none}
    .dchips::-webkit-scrollbar{display:none}
    .dchip{flex-shrink:0;padding:6px 12px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;border:1.5px solid var(--border);background:var(--surface);color:var(--ts);transition:all .2s}
    .dchip.on{background:var(--gd);border-color:var(--gd);color:white}

    /* 섹션 타이틀 */
    .st{font-size:13px;font-weight:700;margin-bottom:9px;color:var(--tm);letter-spacing:.2px}

    /* 통계 */
    .sgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px}
    .scard{background:var(--surface);border-radius:13px;padding:12px 7px;text-align:center;box-shadow:var(--ss);border:1px solid var(--bl2)}
    .snum{font-size:22px;font-weight:900;color:var(--gd)}
    .slb{font-size:10px;color:var(--ts);margin-top:1px}

    /* ── 달력 ── */
    .cal-wrap{background:var(--surface);border-radius:var(--r);box-shadow:var(--sh);border:1px solid var(--bl2);overflow:hidden;margin-bottom:14px}
    .cal-hdr{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;border-bottom:1px solid var(--bl2)}
    .cal-title{font-size:16px;font-weight:800;color:var(--gd)}
    .cal-nav{background:none;border:none;font-size:20px;color:var(--tm);cursor:pointer;padding:2px 8px}
    .cal-days{display:grid;grid-template-columns:repeat(7,1fr)}
    .cal-dh{text-align:center;font-size:10px;font-weight:700;color:var(--ts);padding:7px 0;letter-spacing:.2px}
    .cal-dh.sun{color:#C05858}.cal-dh.sat{color:#4A7360}
    .cal-cell{min-height:52px;padding:4px 2px;cursor:pointer;border-top:1px solid var(--bl2);position:relative;transition:background .15s;display:flex;flex-direction:column;align-items:center}
    .cal-cell:hover{background:var(--gl)}
    .cal-cell.on{background:var(--gl)}
    .cal-cell.today .cal-dn{background:var(--gd);color:white;border-radius:50%}
    .cal-cell.closed{background:#FFF5F5}
    .cal-cell.closed .cal-dn{color:var(--danger)}
    .cal-cell.other .cal-dn{color:var(--border)}
    .cal-cell.sun .cal-dn{color:#C05858}
    .cal-cell.sat .cal-dn{color:#4A7360}
    .cal-dn{font-size:13px;font-weight:700;width:26px;height:26px;display:flex;align-items:center;justify-content:center}
    .cal-dots{display:flex;gap:2px;flex-wrap:wrap;justify-content:center;margin-top:1px;max-width:36px}
    .cal-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0}
    .cal-dot.g{background:var(--gm)}
    .cal-dot.p{background:#E8B46A}
    .cal-dot.r{background:var(--danger)}
    .cal-closed-tag{font-size:9px;color:var(--danger);font-weight:700;margin-top:1px}
    .cal-pending{position:absolute;top:3px;right:3px;background:var(--danger);color:white;font-size:9px;font-weight:700;border-radius:9px;padding:1px 5px;min-width:16px;text-align:center}

    /* 달력 하단 수업 목록 */
    .day-panel{background:var(--surface);border-radius:var(--r);box-shadow:var(--sh);border:1px solid var(--bl2);overflow:hidden}
    .day-panel-hdr{padding:12px 14px;background:var(--gl);border-bottom:1px solid var(--bl2);display:flex;align-items:center;justify-content:space-between}
    .day-panel-title{font-size:14px;font-weight:700;color:var(--gd)}

    /* 결제 선택 */
    .popts{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:14px}
    .popt{border:2px solid var(--border);border-radius:13px;padding:14px 9px;text-align:center;cursor:pointer;transition:all .2s;background:var(--surface)}
    .popt.on{border-color:var(--green);background:var(--gl)}
    .popt.dis{opacity:.4;cursor:not-allowed;pointer-events:none}
    .pic{font-size:24px;margin-bottom:5px}
    .plb{font-size:13px;font-weight:700}
    .pds{font-size:11px;color:var(--ts);margin-top:2px}
    .psoon{font-size:10px;font-weight:700;color:var(--ts);background:var(--bg);padding:2px 7px;border-radius:8px;display:inline-block;margin-top:4px}

    /* 배지 */
    .badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:700}
    .bg{background:var(--gl);color:var(--gd)}
    .bo2{background:var(--gol);color:var(--gold)}
    .bb{background:var(--bl);color:#8A5A50}
    .br{background:#fdf0f0;color:var(--danger)}
    .bw2{background:#FFF3EC;color:var(--warn)}
    .bgr{background:var(--bg);color:var(--ts)}

    /* 모달 */
    .mover{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200;display:flex;align-items:flex-end;animation:fi .2s}
    .modal{background:var(--surface);border-radius:22px 22px 0 0;padding:20px 16px 42px;width:100%;max-width:480px;margin:0 auto;max-height:90vh;overflow-y:auto;animation:su .27s}
    .mh{width:32px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 16px}
    .mt{font-size:17px;font-weight:800;margin-bottom:16px;letter-spacing:-.2px}
    @keyframes fi{from{opacity:0}}@keyframes su{from{transform:translateY(100%)}}

    /* 빈 상태 */
    .empty{text-align:center;padding:36px 18px;color:var(--ts)}
    .ei{font-size:42px;margin-bottom:9px;opacity:.6}
    .et{font-size:14px;font-weight:600}
    .es{font-size:12px;margin-top:3px}

    /* 예약 리스트 행 */
    .brow{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--bl2)}
    .brow:last-child{border-bottom:none}

    /* 내 예약 탭 */
    .btabs{display:flex;border-bottom:2px solid var(--bl2);margin-bottom:12px}
    .btab{flex:1;padding:9px 0;font-size:13px;font-weight:700;border:none;background:none;cursor:pointer;color:var(--ts);border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .15s}
    .btab.on{color:var(--gd);border-bottom-color:var(--gd)}

    /* FAB */
    .fab{position:fixed;bottom:76px;right:16px;width:50px;height:50px;border-radius:50%;background:var(--gd);color:white;border:none;font-size:22px;cursor:pointer;box-shadow:0 4px 18px rgba(46,82,67,.35);display:flex;align-items:center;justify-content:center;z-index:99}

    /* 토스트 */
    .toast{position:fixed;bottom:88px;left:50%;transform:translateX(-50%);background:#1E2820;color:white;padding:9px 18px;border-radius:20px;font-size:12px;font-weight:600;z-index:300;animation:ti .25s,to .25s 2.3s forwards;white-space:nowrap}
    @keyframes ti{from{opacity:0;transform:translateX(-50%) translateY(9px)}}@keyframes to{to{opacity:0;transform:translateX(-50%) translateY(9px)}}

    /* 용량 바 */
    .cap-bar{height:3px;background:var(--bl2);border-radius:2px;margin-top:5px;overflow:hidden}
    .cap-fill{height:100%;border-radius:2px;transition:width .3s}

    /* 휴무일 토글 */
    .holi-btn{font-size:11px;font-weight:700;padding:4px 10px;border-radius:8px;cursor:pointer;border:none;transition:all .2s}

    @media(min-width:480px){body{box-shadow:0 0 50px rgba(0,0,0,.08)}}
  </style>
</head>
<body>
<div id="app"></div>
<script>
// ━━━ 설정 ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const ADMIN_PW = 'bone1234';

const CATS={
  healing:{label:'힐링·리스토어',css:''},
  vinyasa:{label:'빈야사·인요가',css:''},
  aroma:  {label:'아로마',css:'aroma'},
  stretch:{label:'스트레칭',css:'stretch'},
  special:{label:'특별 클래스',css:'special'},
};

const WEEKLY=[
  {dow:1,time:'07:00',name:'빈야사 싱잉볼',cat:'vinyasa'},
  {dow:1,time:'10:30',name:'리스토어 하타',cat:'healing'},
  {dow:1,time:'12:00',name:'힐링요가 싱잉볼',cat:'healing'},
  {dow:2,time:'10:30',name:'테라피 요가',cat:'healing'},
  {dow:2,time:'12:00',name:'스트레칭 순환요가',cat:'stretch'},
  {dow:3,time:'07:00',name:'리스토어 하타',cat:'healing'},
  {dow:3,time:'10:30',name:'아로마 빈야사',cat:'aroma'},
  {dow:3,time:'12:00',name:'리스토어 하타',cat:'healing'},
  {dow:3,time:'20:00',name:'아로마호흡 빈야사',cat:'aroma'},
  {dow:4,time:'10:30',name:'스트레칭 순환요가',cat:'stretch'},
  {dow:4,time:'12:00',name:'힐링 플로우',cat:'healing'},
  {dow:4,time:'20:00',name:'인요가 싱잉볼',cat:'vinyasa'},
  {dow:5,time:'07:00',name:'아로마 호흡빈야사',cat:'aroma'},
  {dow:5,time:'10:30',name:'힐링 플로우',cat:'healing'},
  {dow:5,time:'12:00',name:'아로마 호흡빈야사',cat:'aroma'},
  {dow:5,time:'20:00',name:'아로마 힐링테라피',cat:'aroma'},
  {dow:6,time:'14:00',name:'하타요가 & 싱잉볼',cat:'healing'},
];

// ━━━ 스토리지 ━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const S={
  g:(k,d)=>{try{const v=localStorage.getItem(k);return v?JSON.parse(v):d}catch{return d}},
  s:(k,v)=>localStorage.setItem(k,JSON.stringify(v)),
};
function getCfg(){return S.g('b1_cfg',{pw:ADMIN_PW,instructor:'정윤희',defaultPrice:35000,defaultCap:10});}
function getClasses(){const c=S.g('b1_cls',null);if(!c){const g=genSched();S.s('b1_cls',g);return g;}return c;}
function saveClasses(c){S.s('b1_cls',c);}
function getBookings(){return S.g('b1_bkg',[]);}
function saveBookings(b){S.s('b1_bkg',b);}
function getClosed(){return S.g('b1_closed',[]);}
function saveClosed(d){S.s('b1_closed',d);}

function genSched(){
  const cfg=getCfg(),cls=[],t=new Date();
  for(let w=0;w<4;w++)for(let d=0;d<7;d++){
    const dt=new Date(t);dt.setDate(t.getDate()+w*7+d);
    const dow=dt.getDay(),dateStr=dt.toISOString().split('T')[0];
    WEEKLY.filter(x=>x.dow===dow).forEach(x=>{
      cls.push({id:uid(),name:x.name,date:dateStr,time:x.time,duration:50,
        capacity:cfg.defaultCap,instructor:cfg.instructor,description:'',
        price:cfg.defaultPrice,category:x.cat,isSpecial:false,
        specialBadge:'이달의 특별 클래스',createdAt:Date.now()});
    });
  }
  return cls;
}

// ━━━ 유틸 ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function uid(){return 'id_'+Date.now()+'_'+Math.random().toString(36).slice(2,7);}
function esc(s){return String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
const DAYS=['일','월','화','수','목','금','토'];
function fmtDate(s){const d=new Date(s+'T00:00:00');return `${d.getMonth()+1}월 ${d.getDate()}일 (${DAYS[d.getDay()]})`;}
function fmtTime(t){const[h,m]=t.split(':').map(Number);return `${h<12?'오전':'오후'} ${h<=12?h:h-12}:${String(m).padStart(2,'0')}`;}
function fmtMoney(n){return n.toLocaleString()+'원';}
function todayStr(){return new Date().toISOString().split('T')[0];}
function isFuture(d){return d>=todayStr();}
function isToday(d){return d===todayStr();}
function isClosed(d){return getClosed().includes(d);}
function bookCount(id,status='confirmed'){return getBookings().filter(b=>b.classId===id&&b.status===status).length;}
function pendingCount(id){return bookCount(id,'pending');}
function myBkg(cid,phone){return getBookings().find(b=>b.classId===cid&&b.customerPhone===phone&&(b.status==='pending'||b.status==='confirmed'));}
function cancelOk(cls){return new Date()<new Date(cls.date+'T23:59:59');}
function cfmt(p){return p.replace(/[^0-9]/g,'').replace(/(\d{3})(\d{3,4})(\d{4})/,'$1-$2-$3');}
function dateRange(){const a=[],t=new Date();for(let i=0;i<14;i++){const d=new Date(t);d.setDate(t.getDate()+i);a.push(d.toISOString().split('T')[0]);}return a;}

function toast(msg){
  document.querySelectorAll('.toast').forEach(e=>e.remove());
  const e=document.createElement('div');e.className='toast';e.textContent=msg;
  document.body.appendChild(e);setTimeout(()=>e.remove(),2700);
}

// ━━━ 상태 ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const A={
  user:S.g('b1_user',null),
  screen:'login',
  cTab:'schedule',    // customer: schedule | my
  aTab:'dash',        // admin: dash | cal | special
  bkgTab:'upcoming',  // customer my-bookings: upcoming | past
  selDate:todayStr(), // customer schedule selected date
  calMonth:todayStr().slice(0,7), // YYYY-MM admin calendar month
  calDate:todayStr(), // admin calendar selected date
  expandCls:null,     // admin: expanded class for booking list
  modal:null,         // book | cls-form | special-form
  mData:null,
  editCls:null,
  payMethod:'spot',
  loginTab:'customer',
  _fsp:false,
};

// ━━━ 렌더 ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function render(){
  const app=document.getElementById('app');
  if(!A.user)app.innerHTML=renderLogin();
  else if(A.user.role==='customer')app.innerHTML=renderCustomer();
  else app.innerHTML=renderAdmin();
  if(A.modal)app.insertAdjacentHTML('beforeend',renderModal());
  bindKeys();
}

// ━━━ 로그인 ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function renderLogin(){
  return `<div class="lw">
    <div class="ll">

          <div class="fg"><label class="fl">휴대폰 번호</label><input class="fi" id="lp" type="tel" placeholder="010-1234-5678" autocomplete="tel"></div>

function loginCustomer(){
  const n=document.getElementById('ln')?.value.trim();
  const p=cfmt(document.getElementById('lp')?.value||'');
  if(!n)return toast('이름을 입력해주세요');
  if(p.length<9)return toast('휴대폰 번호를 입력해주세요');
  A.user={name:n,phone:p,role:'customer'};S.s('b1_user',A.user);render();
}
function loginAdmin(){
  if(document.getElementById('apw')?.value===getCfg().pw){
    A.user={name:'관리자',role:'admin'};S.s('b1_user',A.user);render();
  }else toast('비밀번호가 틀렸습니다');
}
function logout(){A.user=null;S.s('b1_user',null);A.modal=null;render();}

function renderCustomer(){

function renderSchedule(){
  const specials=getClasses().filter(c=>c.isSpecial&&isFuture(c.date)).sort((a,b)=>a.date.localeCompare(b.date));
  const all=getClasses().filter(c=>isFuture(c.date)&&!isClosed(c.date)).sort((a,b)=>a.date!==b.date?a.date.localeCompare(b.date):a.time.localeCompare(b.time));
  const dates=dateRange().filter(d=>!isClosed(d));

  const banners=specials.slice(0,2).map(c=>{
    const rem=c.capacity-bookCount(c.id),bkg=myBkg(c.id,A.user.phone);
    return `<div class="sb">
      <div class="sbadge">✨ ${c.specialBadge||'특별 클래스'}</div>
      <div class="sn">${c.name}</div>
      <div class="sm">📅 ${fmtDate(c.date)}&nbsp;·&nbsp;${fmtTime(c.time)}&nbsp;·&nbsp;${c.duration}분</div>
      <div class="sm">강사: ${c.instructor}&nbsp;·&nbsp;잔여 ${rem}자리</div>
      <div class="sp">${fmtMoney(c.price)}</div>
      <div style="margin-top:10px">
        ${bkg
          ?bkg.status==='pending'
            ?`<span class="badge bw2">⏳ 승인 대기 중</span>`
            :`<span class="badge" style="background:rgba(255,255,255,.25);color:white">✓ 예약확정</span>`
          :rem<=0?`<span class="badge" style="background:rgba(0,0,0,.2);color:rgba(255,255,255,.7)">마감</span>`
          :`<button class="btn" style="background:white;color:var(--gd);font-size:13px;font-weight:700;padding:7px 16px" onclick="openBook('${c.id}')">예약하기</button>`}
      </div>
    </div>`;
  }).join('');

  const chips=dateRange().map(d=>{
    if(isClosed(d))return '';
    return `<button class="dchip ${A.selDate===d?'on':''}" onclick="A.selDate='${d}';render()">
      ${isToday(d)?'오늘':`${new Date(d+'T00:00:00').getMonth()+1}/${new Date(d+'T00:00:00').getDate()} (${DAYS[new Date(d+'T00:00:00').getDay()]})`}
    </button>`;
  }).join('');

  const dayCls=all.filter(c=>c.date===A.selDate&&!c.isSpecial);
  const cards=dayCls.length===0
    ?`<div class="empty"><div class="ei">🧘</div><div class="et">이 날은 수업이 없어요</div><div class="es">다른 날짜를 선택해보세요</div></div>`
    :dayCls.map(c=>renderCCard(c)).join('');

  return `${specials.length>0?banners:''}<div class="dchips">${chips}</div>
    <div class="st">${fmtDate(A.selDate)}</div>${cards}`;
}

function renderCCard(cls){
  const cnt=bookCount(cls.id),rem=cls.capacity-cnt;
  const isFull=rem<=0,isFew=rem>0&&rem<=3;
  const bkg=myBkg(cls.id,A.user.phone);
  let pill='',pillCls='';
  if(isFull){pill='마감';pillCls='full';}else if(isFew){pill=`잔여 ${rem}자리`;pillCls='few';}else{pill=`${cnt}/${cls.capacity}명`;}

  let action='';
  if(bkg){
    action=bkg.status==='pending'
      ?`<span class="badge bw2" style="font-size:11px">⏳ 승인대기</span>`
      :`<span class="badge bg" style="font-size:11px">✓ 확정</span>`;
  }else if(isFull){
    action=`<button class="btn bsm" style="background:var(--bg);color:var(--ts);cursor:not-allowed;border:none" disabled>마감</button>`;
  }else{
    action=`<button class="btn bp bsm" onclick="openBook('${cls.id}')">예약</button>`;
  }

  return `<div class="cc ${CATS[cls.category]?.css||''}">
    <div class="crow"><div class="cn">${cls.name}</div>${action}</div>
    <div class="cm">${fmtTime(cls.time)}&nbsp;·&nbsp;${cls.duration}분&nbsp;·&nbsp;${cls.instructor}</div>
    ${cls.description?`<div class="cm" style="color:var(--ts)">${cls.description}</div>`:''}
    <div style="display:flex;align-items:center;justify-content:space-between;margin-top:6px">
      <span style="font-size:11px;color:${isFull?'var(--danger)':isFew?'var(--warn)':'var(--ts)'};background:var(--bg);padding:2px 8px;border-radius:20px;border:1px solid var(--bl2)">👥 ${pill}</span>
      <span style="font-size:12px;color:var(--gd);font-weight:700">${fmtMoney(cls.price)}</span>
    </div>
  </div>`;
}

function renderMyBkgs(){
  const all=getBookings().filter(b=>b.customerPhone===A.user.phone);
  const upcoming=all.filter(b=>{const c=getClasses().find(x=>x.id===b.classId);return c&&isFuture(c.date);})
    .sort((a,b)=>(getClasses().find(x=>x.id===a.classId)?.date||'').localeCompare(getClasses().find(x=>x.id===b.classId)?.date||''));
  const past=all.filter(b=>{const c=getClasses().find(x=>x.id===b.classId);return c&&!isFuture(c.date);})
    .sort((a,b)=>(getClasses().find(x=>x.id===b.classId)?.date||'').localeCompare(getClasses().find(x=>x.id===a.classId)?.date||''));

  const card=(b,isPast)=>{
    const c=getClasses().find(x=>x.id===b.classId);if(!c)return '';
    const badge=
      b.status==='pending'?`<span class="badge bw2">⏳ 승인대기</span>`
      :b.status==='confirmed'?b.paymentMethod==='spot'?`<span class="badge bb">🏠 현장</span>`:`<span class="badge bo2">📋 후불</span>`
      :b.status==='rejected'?`<span class="badge br">거절됨</span>`
      :`<span class="badge br">취소됨</span>`;
    return `<div class="cc ${CATS[c.category]?.css||''}" style="${b.status==='cancelled'||b.status==='rejected'?'opacity:.5':''}">
      <div class="crow"><div class="cn">${c.name}</div>${badge}</div>
      <div class="cm">${fmtDate(c.date)}&nbsp;·&nbsp;${fmtTime(c.time)}</div>
      <div class="cm">${fmtMoney(c.price)}&nbsp;·&nbsp;${c.instructor}</div>
      ${!isPast&&(b.status==='pending'||b.status==='confirmed')&&cancelOk(c)?`
        <div style="margin-top:9px">
          <button class="btn bd bsm" onclick="cancelBkg('${b.id}')">예약 취소</button>
        </div>`:''}
    </div>`;
  };

  const upcomingCnt=upcoming.filter(b=>b.status==='pending'||b.status==='confirmed').length;
  return `<div class="btabs">
    <button class="btab ${A.bkgTab==='upcoming'?'on':''}" onclick="A.bkgTab='upcoming';render()">예정된 예약 ${upcomingCnt}</button>
    <button class="btab ${A.bkgTab==='past'?'on':''}" onclick="A.bkgTab='past';render()">지난 예약 ${past.length}</button>
  </div>
  ${A.bkgTab==='upcoming'
    ?upcoming.length===0?`<div class="empty"><div class="ei">🎫</div><div class="et">예정된 예약이 없어요</div><div class="es">수업 탭에서 예약해보세요</div></div>`:upcoming.map(b=>card(b,false)).join('')
    :past.length===0?`<div class="empty"><div class="ei">📖</div><div class="et">지난 수업 내역이 없어요</div><div class="es">수업을 들으면 여기에 기록돼요</div></div>`:past.map(b=>card(b,true)).join('')
  }`;
}

function renderDash(){
  const t=todayStr(),cls=getClasses(),bkgs=getBookings();
  const tCls=cls.filter(c=>c.date===t).sort((a,b)=>a.time.localeCompare(b.time));
  const tConf=bkgs.filter(b=>{const c=cls.find(x=>x.id===b.classId);return c&&c.date===t&&b.status==='confirmed';});
  const members=[...new Set(bkgs.filter(b=>b.status==='confirmed'||b.status==='pending').map(b=>b.customerPhone))];
  const pending=bkgs.filter(b=>b.status==='pending');

  const tCards=tCls.length===0
    ?`<div class="empty" style="padding:20px"><div class="ei">📅</div><div class="et">오늘 수업이 없어요</div></div>`
    :tCls.map(c=>{
      const cnt=bookCount(c.id),pnd=pendingCount(c.id);
      return `<div class="card" style="cursor:pointer" onclick="A.aTab='cal';A.calDate='${c.date}';A.expandCls='${c.id}';render()">
        <div style="display:flex;justify-content:space-between;align-items:center">
          <div>
            <div style="font-size:14px;font-weight:700">${c.name}</div>
            <div style="font-size:12px;color:var(--tm)">${fmtTime(c.time)}&nbsp;·&nbsp;${c.duration}분</div>
          </div>
          <div style="text-align:right">
            <div style="font-size:20px;font-weight:900;color:var(--gd)">${cnt}<span style="font-size:11px;color:var(--ts);font-weight:500">/${c.capacity}</span></div>
            ${pnd>0?`<div style="font-size:10px;color:var(--danger);font-weight:700">승인대기 ${pnd}</div>`:''}
          </div>
        </div>
        <div class="cap-bar"><div class="cap-fill" style="width:${Math.round(cnt/c.capacity*100)}%;background:${cnt===c.capacity?'var(--danger)':cnt>=c.capacity*.8?'var(--warn)':'var(--gm)'}"></div></div>
      </div>`;
    }).join('');

  return `<div class="sgrid">
    <div class="scard"><div class="snum">${tCls.length}</div><div class="slb">오늘 수업</div></div>
    <div class="scard"><div class="snum">${tConf.length}</div><div class="slb">오늘 확정</div></div>
    <div class="scard"><div class="snum">${members.length}</div><div class="slb">총 회원</div></div>
  </div>
  ${pending.length>0?`<div class="card" style="background:#FFF3EC;border-color:var(--warn);cursor:pointer;margin-bottom:14px" onclick="A.aTab='cal';render()">
    <div style="font-size:13px;font-weight:700;color:var(--warn)">⏳ 예약 승인 대기 ${pending.length}건</div>
    <div style="font-size:11px;color:var(--tm);margin-top:3px">달력에서 확인하고 승인해주세요</div>

// ━━━ 관리자 달력 ━━━━━━━━━━━━━━━━━━━━━━━━━━
function renderCal(){
  const[yr,mo]=A.calMonth.split('-').map(Number);
  const prevM=mo===1?`${yr-1}-12`:`${yr}-${String(mo-1).padStart(2,'0')}`;
  const nextM=mo===12?`${yr+1}-01`:`${yr}-${String(mo+1).padStart(2,'0')}`;
  const moLabel=`${yr}년 ${mo}월`;

  // 달력 날짜 계산
  const firstDay=new Date(yr,mo-1,1).getDay(); // 0=일
  const daysInMonth=new Date(yr,mo,0).getDate();
  const daysInPrev=new Date(yr,mo-1,0).getDate();

  const bkgs=getBookings();
  const cls=getClasses();

  let cells='';
  let cellIdx=0;
  // 이전 달 채우기
  for(let i=firstDay-1;i>=0;i--){
    const d=daysInPrev-i;
    cells+=`<div class="cal-cell other"><div class="cal-dn">${d}</div></div>`;
    cellIdx++;
  }
  // 이번 달
  for(let d=1;d<=daysInMonth;d++){
    const dateStr=`${yr}-${String(mo).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const dow=new Date(yr,mo-1,d).getDay();
    const closed=isClosed(dateStr);
    const dayCls=cls.filter(c=>c.date===dateStr);
    const dayPending=bkgs.filter(b=>b.status==='pending'&&dayCls.some(c=>c.id===b.classId)).length;
    const isSelected=A.calDate===dateStr;
    const isT=isToday(dateStr);

    let dotHtml='';
    if(!closed){
      const special=dayCls.filter(c=>c.isSpecial);
      const regular=dayCls.filter(c=>!c.isSpecial);
      const dots=[];
      if(regular.length>0)for(let i=0;i<Math.min(regular.length,3);i++)dots.push(`<div class="cal-dot g"></div>`);
      if(special.length>0)dots.push(`<div class="cal-dot p"></div>`);
      if(dayPending>0)dots.push(`<div class="cal-dot r"></div>`);
      dotHtml=dots.length>0?`<div class="cal-dots">${dots.join('')}</div>`:'';
    }

    cells+=`<div class="cal-cell ${isT?'today':''} ${isSelected?'on':''} ${closed?'closed':''} ${dow===0?'sun':dow===6?'sat':''}"
      onclick="A.calDate='${dateStr}';A.expandCls=null;render()">
      <div class="cal-dn">${d}</div>
      ${closed?`<div class="cal-closed-tag">휴무</div>`:dotHtml}
      ${dayPending>0&&!closed?`<div class="cal-pending">${dayPending}</div>`:''}
    </div>`;
    cellIdx++;
  }
  // 다음 달 채우기
  const remaining=(7-cellIdx%7)%7;
  for(let d=1;d<=remaining;d++){
    cells+=`<div class="cal-cell other"><div class="cal-dn">${d}</div></div>`;
  }

  // 선택된 날짜의 수업 목록
  const selClosed=isClosed(A.calDate);
  const selCls=cls.filter(c=>c.date===A.calDate).sort((a,b)=>a.time.localeCompare(b.time));

  const dayPanel=`<div class="day-panel">
    <div class="day-panel-hdr">
      <div class="day-panel-title">${fmtDate(A.calDate)}</div>
      <div style="display:flex;gap:8px;align-items:center">
        ${selClosed
          ?`<button class="holi-btn" style="background:var(--gl);color:var(--gd)" onclick="toggleClosed('${A.calDate}')">휴무 해제</button>`
          :`<button class="holi-btn" style="background:#fdf0f0;color:var(--danger)" onclick="toggleClosed('${A.calDate}')">휴무 지정</button>`}
      </div>
    </div>
    ${selClosed?`<div style="padding:20px;text-align:center;color:var(--danger);font-weight:600;font-size:13px">🚫 휴무일로 지정된 날짜예요</div>`
    :selCls.length===0?`<div class="empty" style="padding:24px"><div class="ei">📅</div><div class="et">등록된 수업이 없어요</div><div class="es">+ 버튼으로 수업을 추가하세요</div></div>`
    :selCls.map(c=>{
      const conf=bookCount(c.id),pend=pendingCount(c.id);
      const isExp=A.expandCls===c.id;
      const dayBkgs=bkgs.filter(b=>b.classId===c.id&&(b.status==='confirmed'||b.status==='pending'));
      return `<div style="border-bottom:1px solid var(--bl2)">
        <div style="padding:12px 14px;cursor:pointer;display:flex;justify-content:space-between;align-items:center"
          onclick="A.expandCls=A.expandCls==='${c.id}'?null:'${c.id}';render()">
          <div>
            <div style="font-size:14px;font-weight:700">${c.isSpecial?'✨ ':''}${c.name}</div>
            <div style="font-size:12px;color:var(--tm)">${fmtTime(c.time)}&nbsp;·&nbsp;${c.duration}분</div>
            <div style="font-size:11px;margin-top:2px">
              <span style="color:var(--gd);font-weight:700">확정 ${conf}</span>
              ${pend>0?`&nbsp;<span style="color:var(--danger);font-weight:700">대기 ${pend}</span>`:''}/&nbsp;${c.capacity}명
            </div>
          </div>
          <div style="display:flex;flex-direction:column;gap:5px;align-items:flex-end">
            <div style="display:flex;gap:5px">
              <button class="btn bo bsm" onclick="event.stopPropagation();editCls('${c.id}')">수정</button>
              <button class="btn bd bsm" onclick="event.stopPropagation();delCls('${c.id}')">삭제</button>
            </div>
            <span style="color:var(--ts);font-size:14px">${isExp?'▲':'▼'}</span>
          </div>
        </div>
        ${isExp?`<div style="padding:0 14px 14px">
          <div class="cap-bar" style="margin-bottom:10px"><div class="cap-fill" style="width:${Math.round(conf/c.capacity*100)}%;background:var(--gm)"></div></div>
          ${!dayBkgs.length?`<div style="font-size:12px;color:var(--ts);text-align:center;padding:8px">예약자가 없어요</div>`
          :dayBkgs.map(b=>`<div class="brow">
            <div>
              <div style="font-size:13px;font-weight:700">${esc(b.customerName)}
                ${b.status==='pending'?`<span class="badge bw2" style="font-size:10px;margin-left:4px">대기</span>`:`<span class="badge bg" style="font-size:10px;margin-left:4px">확정</span>`}
              </div>
              <div style="font-size:11px;color:var(--tm)">${b.customerPhone}&nbsp;·&nbsp;${b.paymentMethod==='spot'?'🏠 현장':'📋 후불'}</div>
            </div>
            <div style="display:flex;gap:5px;align-items:center">
              ${b.status==='pending'
                ?`<button class="bapp" onclick="approveBook('${b.id}')">✓ 승인</button>
                   <button class="brej" onclick="rejectBook('${b.id}')">✗ 거절</button>`
                :`<button class="check-btn ${b.checkedIn?'on':''}" onclick="toggleCheck('${b.id}')" style="width:28px;height:28px;border-radius:50%;border:2px solid var(--border);background:${b.checkedIn?'var(--green)':'none'};cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center;color:${b.checkedIn?'white':'inherit'}">${b.checkedIn?'✓':''}</button>`}
            </div>
          </div>`).join('')}
        </div>`:''}
      </div>`;
    }).join('')}
  </div>`;

  // 이번 달 정기수업 일괄 생성
  const hasCls=cls.filter(c=>c.date.startsWith(A.calMonth)&&!c.isSpecial).length>0;
  const genBtn=!hasCls?`<button class="btn bp bfull" style="margin-bottom:12px" onclick="genMonthSched('${A.calMonth}')">📅 ${moLabel} 정기 수업 일괄 생성</button>`:'';

  return `<div class="cal-wrap">
    <div class="cal-hdr">
      <button class="cal-nav" onclick="A.calMonth='${prevM}';render()">‹</button>
      <div class="cal-title">${moLabel}</div>
      <button class="cal-nav" onclick="A.calMonth='${nextM}';render()">›</button>
    </div>
    <div class="cal-days">
      ${['일','월','화','수','목','금','토'].map((d,i)=>`<div class="cal-dh ${i===0?'sun':i===6?'sat':''}">${d}</div>`).join('')}
      ${cells}
    </div>
  </div>
  ${genBtn}${dayPanel}`;
}

function genMonthSched(yearMon){
  const[yr,mo]=yearMon.split('-').map(Number);
  const cfg=getCfg(),cls=getClasses(),added=[];
  const dim=new Date(yr,mo,0).getDate();
  for(let d=1;d<=dim;d++){
    const dt=new Date(yr,mo-1,d);
    const dateStr=`${yr}-${String(mo).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    if(isClosed(dateStr))continue;
    WEEKLY.filter(t=>t.dow===dt.getDay()).forEach(t=>{
      if(!cls.some(c=>c.date===dateStr&&c.time===t.time&&c.name===t.name)){
        const nc={id:uid(),name:t.name,date:dateStr,time:t.time,duration:50,
          capacity:cfg.defaultCap,instructor:cfg.instructor,description:'',
          price:cfg.defaultPrice,category:t.cat,isSpecial:false,
          specialBadge:'이달의 특별 클래스',createdAt:Date.now()};
        cls.push(nc);added.push(nc);
      }
    });
  }
  saveClasses(cls);toast(`${mo}월 정기 수업 ${added.length}개 생성됐어요`);render();
}

// ━━━ 특별클래스 관리 ━━━━━━━━━━━━━━━━━━━━━━
function renderSpecialMgmt(){
  const all=getClasses().filter(c=>isFuture(c.date)).sort((a,b)=>a.date.localeCompare(b.date));
  const specials=all.filter(c=>c.isSpecial);
  const normals=all.filter(c=>!c.isSpecial);

  const sCards=specials.length===0
    ?`<div class="empty" style="padding:24px"><div class="ei">✨</div><div class="et">등록된 특별 클래스가 없어요</div><div class="es">아래에서 일반 수업을 배너로 등록하세요</div></div>`
    :specials.map(c=>`<div class="sb" style="margin-bottom:10px">
      <div class="sbadge">✨ ${c.specialBadge}</div>
      <div class="sn">${c.name}</div>
      <div class="sm">${fmtDate(c.date)}&nbsp;·&nbsp;${fmtTime(c.time)}</div>
      <div class="sp">${fmtMoney(c.price)}&nbsp;·&nbsp;예약 ${bookCount(c.id)}/${c.capacity}명</div>
      <div style="display:flex;gap:7px;margin-top:10px">
        <button class="btn bsm" style="background:rgba(255,255,255,.2);color:white;border:none" onclick="editCls('${c.id}')">수정</button>
        <button class="btn bsm" style="background:rgba(255,255,255,.1);color:white;border:none" onclick="unmarkSpecial('${c.id}')">배너 해제</button>
      </div>
    </div>`).join('');

  const promote=normals.length===0?'':`
    <div class="st" style="margin-top:${specials.length>0?'18':'0'}px;color:var(--ts)">일반 수업 → 배너 등록</div>
    ${normals.slice(0,8).map(c=>`<div class="card" style="display:flex;align-items:center;justify-content:space-between;padding:11px 13px">
      <div>
        <div style="font-size:13px;font-weight:700">${c.name}</div>
        <div style="font-size:11px;color:var(--ts)">${fmtDate(c.date)}&nbsp;·&nbsp;${fmtTime(c.time)}</div>
      </div>
      <button class="btn bsm" style="background:var(--gol);color:var(--gold);border:none;font-weight:700" onclick="markSpecial('${c.id}')">✨ 등록</button>
    </div>`).join('')}`;

  return `${sCards}${promote}`;
}

// ━━━ 모달 ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function renderModal(){
  return `<div class="mover" onclick="closeModalBg(event)">
    <div class="modal">
      <div class="mh"></div>
      ${A.modal==='book'?renderBookModal():A.modal==='cls-form'?renderClsForm():''}
    </div>
  </div>`;
}

function renderBookModal(){
  const cls=getClasses().find(c=>c.id===A.mData);if(!cls)return '';
  const rem=cls.capacity-bookCount(cls.id);
  return `<div class="mt">수업 예약</div>
    <div style="background:var(--gl);border-radius:11px;padding:13px;margin-bottom:16px;border:1px solid var(--bl2)">
      <div style="font-size:15px;font-weight:700;margin-bottom:3px">${cls.name}</div>
      <div style="font-size:12px;color:var(--tm);line-height:1.7">${fmtDate(cls.date)}&nbsp;·&nbsp;${fmtTime(cls.time)}&nbsp;·&nbsp;${cls.duration}분</div>
      <div style="font-size:12px;color:var(--tm)">강사: ${cls.instructor}&nbsp;·&nbsp;잔여 ${rem}자리</div>
      <div style="font-size:14px;font-weight:700;color:var(--gd);margin-top:5px">${fmtMoney(cls.price)}</div>
    </div>
    <div class="card" style="background:#FFF8EC;border-color:#E8C97A;margin-bottom:14px;padding:10px 13px">
      <div style="font-size:12px;color:#8A6830;font-weight:600">⏳ 예약 후 관리자 승인이 필요해요</div>
      <div style="font-size:11px;color:var(--ts);margin-top:2px">승인 후 최종 확정됩니다</div>
    </div>
    <div style="font-size:11px;font-weight:700;color:var(--ts);letter-spacing:.3px;margin-bottom:9px">결제 방식</div>
    <div class="popts">
      <div class="popt ${A.payMethod==='spot'?'on':''}" onclick="A.payMethod='spot';render()">
        <div class="pic">🏠</div><div class="plb">현장 결제</div><div class="pds">방문 시 결제</div>
      </div>
      <div class="popt ${A.payMethod==='postpay'?'on':''}" onclick="A.payMethod='postpay';render()">
        <div class="pic">📋</div><div class="plb">후불 결제</div><div class="pds">수업 후 결제</div>
      </div>
    </div>
    <div class="popt dis" style="border-radius:10px;padding:11px 13px;display:flex;align-items:center;gap:10px;margin-bottom:16px;background:var(--bg)">
      <span style="font-size:20px">💳</span>
      <div><div class="plb" style="color:var(--ts)">온라인 결제</div><div class="pds">카드·간편결제</div></div>
      <span class="psoon" style="margin-left:auto">준비 중</span>
    </div>
    <div style="display:flex;gap:8px">
      <button class="btn bo bfull" onclick="closeModal()">취소</button>
      <button class="btn bp bfull" onclick="confirmBook('${cls.id}')">예약 신청</button>
    </div>`;
}

function renderClsForm(){
  const c=A.editCls,cfg=getCfg();
  const catOpts=Object.entries(CATS).map(([k,v])=>`<option value="${k}" ${(c?.category||'healing')===k?'selected':''}>${v.label}</option>`).join('');
  return `<div class="mt">${c?'수업 수정':'수업 추가'}</div>
    <div class="fg"><label class="fl">수업명</label><input class="fi" id="fn" value="${c?.name||''}" placeholder="빈야사 싱잉볼"></div>
    <div class="frow">
      <div class="fg"><label class="fl">날짜</label><input class="fi" id="fd" type="date" value="${c?.date||A.calDate}"></div>
      <div class="fg"><label class="fl">시간</label><input class="fi" id="ft" type="time" value="${c?.time||'10:00'}"></div>
    </div>
    <div class="frow">
      <div class="fg"><label class="fl">소요(분)</label><input class="fi" id="fdu" type="number" value="${c?.duration||50}" min="10"></div>
      <div class="fg"><label class="fl">정원(명)</label><input class="fi" id="fca" type="number" value="${c?.capacity||cfg.defaultCap}" min="1"></div>
    </div>
    <div class="frow">
      <div class="fg"><label class="fl">가격(원)</label><input class="fi" id="fpr" type="number" value="${c?.price||cfg.defaultPrice}"></div>
      <div class="fg"><label class="fl">카테고리</label><select class="fi" id="fct">${catOpts}</select></div>
    </div>
    <div class="fg"><label class="fl">강사</label><input class="fi" id="fin" value="${c?.instructor||cfg.instructor}"></div>
    <div class="fg"><label class="fl">설명 (선택)</label><input class="fi" id="fds" value="${c?.description||''}" placeholder="한 줄 소개"></div>
    <div style="display:flex;align-items:center;gap:9px;margin-bottom:${A._fsp?'11':'18'}px">
      <input type="checkbox" id="fsp" ${A._fsp?'checked':''} style="width:17px;height:17px;accent-color:var(--gold)">
      <label for="fsp" style="font-size:13px;font-weight:600;color:var(--gold);cursor:pointer">✨ 특별 클래스 메인 배너 노출</label>
    </div>
    ${A._fsp?`<div class="fg"><label class="fl">배너 문구</label><input class="fi" id="fsb" value="${c?.specialBadge||'이달의 특별 클래스'}"></div>`:''}
    <div style="display:flex;gap:8px;margin-top:4px">
      <button class="btn bo bfull" onclick="closeModal()">취소</button>
      <button class="btn bp bfull" onclick="${c?`saveCls('${c.id}')`:'addCls()'}">저장</button>
    </div>`;
}

// ━━━ 액션 ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function openBook(id){A.modal='book';A.mData=id;A.payMethod='spot';render();}
function closeModal(){A.modal=null;A.mData=null;A.editCls=null;render();}
function closeModalBg(e){if(e.target===e.currentTarget)closeModal();}

function confirmBook(classId){
  const cls=getClasses().find(c=>c.id===classId);if(!cls)return;
  const bkgs=getBookings();
  if(myBkg(classId,A.user.phone)){toast('이미 예약 신청하셨어요');return;}
  if(bookCount(classId)>=cls.capacity){toast('정원이 마감되었어요');return;}
  bkgs.push({id:uid(),classId,customerName:A.user.name,customerPhone:A.user.phone,
    paymentMethod:A.payMethod,status:'pending',checkedIn:false,
    amount:cls.price,createdAt:Date.now()});
  saveBookings(bkgs);closeModal();
  toast('예약 신청 완료! 관리자 승인을 기다려주세요 🌿');
}

function approveBook(id){
  const bkgs=getBookings(),b=bkgs.find(x=>x.id===id);
  if(b)b.status='confirmed';saveBookings(bkgs);toast('예약이 승인됐어요');render();
}
function rejectBook(id){
  if(!confirm('예약을 거절하시겠어요?'))return;
  const bkgs=getBookings(),b=bkgs.find(x=>x.id===id);
  if(b)b.status='rejected';saveBookings(bkgs);toast('예약이 거절됐어요');render();
}
function cancelBkg(id){
  if(!confirm('예약을 취소하시겠어요?\n(당일 자정 이전까지만 가능)'))return;
  const bkgs=getBookings(),b=bkgs.find(x=>x.id===id);
  const cls=b?getClasses().find(c=>c.id===b.classId):null;
  if(cls&&!cancelOk(cls)){toast('당일 자정 이후에는 취소할 수 없어요');return;}
  if(b)b.status='cancelled';saveBookings(bkgs);toast('예약이 취소됐어요');render();
}

function toggleCheck(id){
  const bkgs=getBookings(),b=bkgs.find(x=>x.id===id);
  if(b)b.checkedIn=!b.checkedIn;saveBookings(bkgs);render();
}
function toggleClosed(date){
  const closed=getClosed();
  const idx=closed.indexOf(date);
  if(idx>=0)closed.splice(idx,1);else closed.push(date);
  saveClosed(closed);toast(idx>=0?'휴무가 해제됐어요':'휴무일로 지정됐어요');render();
}

function openAddCls(){A.modal='cls-form';A.editCls=null;A._fsp=false;render();}
function editCls(id){A.editCls=getClasses().find(c=>c.id===id)||null;A._fsp=A.editCls?.isSpecial||false;A.modal='cls-form';render();}
function delCls(id){
  if(!confirm('수업을 삭제하시겠어요?'))return;
  saveClasses(getClasses().filter(c=>c.id!==id));
  saveBookings(getBookings().filter(b=>b.classId!==id));
  toast('수업이 삭제됐어요');render();
}

function markSpecial(id){
  const cls=getClasses(),i=cls.findIndex(c=>c.id===id);
  if(i>=0)cls[i].isSpecial=true;saveClasses(cls);toast('특별 클래스로 등록됐어요 ✨');render();
}
function unmarkSpecial(id){
  const cls=getClasses(),i=cls.findIndex(c=>c.id===id);
  if(i>=0)cls[i].isSpecial=false;saveClasses(cls);toast('배너에서 해제됐어요');render();
}

function getFormData(){
  return{
    name:document.getElementById('fn')?.value.trim(),
    date:document.getElementById('fd')?.value,
    time:document.getElementById('ft')?.value,
    duration:parseInt(document.getElementById('fdu')?.value),
    capacity:parseInt(document.getElementById('fca')?.value),
    price:parseInt(document.getElementById('fpr')?.value),
    category:document.getElementById('fct')?.value,
    instructor:document.getElementById('fin')?.value.trim(),
    description:document.getElementById('fds')?.value.trim(),
    isSpecial:!!document.getElementById('fsp')?.checked,
    specialBadge:document.getElementById('fsb')?.value.trim()||'이달의 특별 클래스',
  };
}
function addCls(){
  const f=getFormData();
  if(!f.name||!f.date||!f.time||!f.duration||!f.capacity||!f.price)return toast('필수 항목을 모두 입력해주세요');
  const cls=getClasses();
  cls.push({id:uid(),...f,instructor:f.instructor||getCfg().instructor,createdAt:Date.now()});
  saveClasses(cls);closeModal();toast('수업이 추가됐어요');
}
function saveCls(id){
  const f=getFormData();
  if(!f.name||!f.date||!f.time||!f.duration||!f.capacity||!f.price)return toast('필수 항목을 모두 입력해주세요');
  const cls=getClasses(),i=cls.findIndex(c=>c.id===id);if(i<0)return;
  cls[i]={...cls[i],...f};saveClasses(cls);closeModal();toast('수업이 수정됐어요');
}

// ━━━ 키 바인딩 ━━━━━━━━━━━━━━━━━━━━━━━━━━━
function bindKeys(){
  document.getElementById('lp')?.addEventListener('keypress',e=>e.key==='Enter'&&loginCustomer());
  document.getElementById('apw')?.addEventListener('keypress',e=>e.key==='Enter'&&loginAdmin());
  document.getElementById('ln')?.addEventListener('keypress',e=>e.key==='Enter'&&document.getElementById('lp')?.focus());
}
document.addEventListener('change',e=>{if(e.target.id==='fsp'){A._fsp=e.target.checked;render();}});

// ━━━ 초기화 ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
if(A.user)A.screen='main';
render();
</script>
</body>
</html>
